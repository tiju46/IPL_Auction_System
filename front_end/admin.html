<!DOCTYPE html>
<html>
<head>
    <title>Admin Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="navbar">   
    <a href="index.html">Home</a>
    <a href="players.html">Players</a>
    <a href="teams.html">Teams</a>
    <a href="admin.html">Admin Profile</a>
    <span class="spacer"></span>
    <a href="login.html" onclick="localStorage.removeItem('loggedInUser');" class="logout">Logout</a>
</div>

<div class="container admin-profile">
    <h2>Admin Profile</h2>

    <div class="profile-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png" class="admin-avatar">

        <div class="profile-info">
            <p><strong>Name:</strong> <span id="adminName"></span></p>
            <p><strong>Username:</strong> <span id="adminUsername"></span></p>
            <p><strong>Email:</strong> <span id="adminEmail"></span></p>
            <p><strong>Role:</strong> <span id="adminRole"></span></p>
            <p><strong>Last Login:</strong> <span id="adminLastLogin"></span></p>
        </div>
    </div>

    <h3>Quick Actions</h3>
    <div class="quick-actions">
        <a href="players.html" class="action-btn">Manage Players</a>
        <a href="teams.html" class="action-btn">Manage Teams</a>
        <a href="assign.html" class="action-btn">Assign Players</a>
    </div>
    <button class="change-password-btn" id="changePasswordBtn" onclick="openPasswordModal()">Change Password</button>
<div id="passwordModal" class="modal-backdrop">
    <div class="modal-content">
        <h3>Change Password</h3>    
        <div class="form-group">
            <label for="currentPassword">Current Password:</label>
            <input type="password" id="currentPassword" required>
        </div>   
        <div class="form-group">
            <label for="newPassword">New Password:</label>
            <input type="password" id="newPassword" required>
        </div>      
        <div class="form-group">
            <label for="confirmPassword">Confirm New Password:</label>
            <input type="password" id="confirmPassword" required>
        </div>      
        <p id="modalMessage" class="error-text"></p>     
        <div class="modal-actions">
            <button onclick="submitPasswordChange()" class="btn-submit">Update</button>
            <button onclick="closePasswordModal()" class="btn-cancel">Cancel</button>
        </div>
    </div>
</div>
</div>
<script src="script.js"></script>

<footer class="footer">
    © 2026 All Rights Reserved — Tiju Thomas
</footer>
</body>
</html>
