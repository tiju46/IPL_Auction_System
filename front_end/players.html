<!DOCTYPE html>
<html>
<head>
    <title>Player Management</title>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">

</head>
<body onload="loadPlayers('player')">
    <div class="navbar">   
        <a href="index.html">Home</a>
        <a href="players.html">Players</a>
        <a href="teams.html">Teams</a>
        <span class="spacer"></span>
        <a href="admin.html">Admin Profile</a>
        <a href="login.html" class="logout">Logout</a>
</div>
<div class="container">
    <h2>Player Management</h2>

    <h3>Add New Player</h3>
    <input id="name" placeholder="Player Name"><br><br>
    <input id="role" placeholder="Role (Batsman/Bowler/All-rounder)"><br><br>
    <input id="base_price" placeholder="Base Price" type="number"><br><br>
    <label>Player Image URL:</label>
    <input id="playerImage" placeholder="Enter image URL (optional)">
    <button onclick="addPlayer()">Add Player</button>
    <hr>
    <h3>All Players</h3>
    <input 
    id="searchBox" 
    placeholder="Search players by name or role..." 
    onkeyup="filterPlayers('player')" 
    style="width: 300px; padding: 5px; margin-bottom: 15px;">

    <div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Role</th>
                <th>Base Price</th>
                <th>Team</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="playerTable"></tbody>
    </table>
</div>
<div id="imageModal" class="image-modal">
    <span class="close-btn" onclick="closeImageModal()">×</span>
    <img id="modalImage" class="modal-content">
</div>
</div>
    <script src="script.js"></script>
<footer class="footer">
    © 2026 All Rights Reserved — Tiju Thomas
</footer>
</body>
</html>
