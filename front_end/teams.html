<!DOCTYPE html>
<html>
<head>
    <title>Team Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<div class="navbar">   
        <a href="index.html">Home</a>
        <a href="players.html">Players</a>
        <a href="teams.html">Teams</a>
        <span class="spacer"></span>
        <a href="admin.html">Admin Profile</a>
        <a href="login.html" onclick="localStorage.removeItem('loggedInUser');" class="logout">Logout</a>
</div>
<div class="container">
    <h2>Team Assignment</h2>

    <h3>Assign Player to Team</h3>

    <label>Select Player:</label><br>
    <select id="playerSelect"></select><br><br>

    <label>Select Team:</label><br>
    <select id="teamSelect"></select><br><br>

    <button onclick="assignTeam()">Assign</button>

    <hr>

    <h3>All Players with Teams</h3>
    <input 
    id="searchBox" 
    placeholder="Search players by name or role..." 
    onkeyup="filterPlayers('teams')" 
    style="width: 300px; padding: 5px; margin-bottom: 15px;">

    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Role</th>
                <th>Base Price</th>
                <th>Team</th>
            </tr>
        </thead>
        <tbody id="teamTable"></tbody>
    </table>

    <script src="script.js"></script>
</div>
</body>
<footer class="footer">

</footer>
</html>
