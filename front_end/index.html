<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>IPL Auction Tracker – Home Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadPlayers('home')">

<div class="navbar">
    <a href="login.html">Admin Login</a>
</div>

<div class="container">
    <h2 style="text-align: center;"">IPL Auction Tracker – Player Showcase</h2>
    <p style="color:#555;">List of all players were successfully sold out in the auction.</p>

    <input 
        id="searchBox" 
        placeholder="Search players by name or role..." 
        onkeyup="filterPlayers('home')" 
        style="width: 300px; padding: 8px; margin-bottom: 15px;">

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Base Price</th>
                    <th>Team</th>
                </tr>
            </thead>
            <tbody id="HomeplayerTable"></tbody>
        </table>
    </div>   
</div>
<div id="imageModal" class="image-modal">
    <span class="close-btn" onclick="closeImageModal()">×</span>
    <img id="modalImage" class="modal-content">
</div>
<script src="script.js"></script> 
</body>
<footer class="footer">
    © 2026 All Rights Reserved — Tiju Thomas
</footer>
</html>
